#  Every flag, credential, version string and user lives here. Roles reference
#  these vars so the whole box stays internally consistent.
# ============================================================================

# ---- Identity / theming ------------------------------------------------------
box_hostname: capsulecorp.htb
box_domain: capsulecorp.htb
theme_year: 2015

# touch -t format is [[CC]YY]MMDDhhmm[.ss]
mtime_2015: "201505101200.00"     # box content lives in 2015
mtime_2024: "202401010000.00"     # easter-egg artifacts arrive from 2024

# ---- App branding (player-visible) ------------------------------------------
app_name: "Dragon Radar Dashboard"
app_version: "2.4.1"              # deployed (vulnerable) version
app_fixed_version: "2.4.2"        # the fix that "doesn't exist yet" in 2015
app_build_date: "2015-04-18"      # server's own date
app_changelog_paradox_date: "2024-07-30"   # impossible: a fix dated in the future
nginx_banner_version: "1.18.0"    # spoofed Server header
ssh_banner_version: "OpenSSH 8.x" # cosmetic reference only (see base role note)

# ---- Python web stack pins (period flavor) ----------------------------------
# NOTE: requirements.txt advertises Flask {{ flask_documented }} as 2015 set
# dressing. The role installs {{ flask_runtime }} into an isolated venv so the
# box boots reliably on Debian 12 / Python 3.11. The deserialization bug is in
# our own session.py and is independent of the Flask version.
flask_documented: "1.1.2"
flask_runtime: "2.0.3"
werkzeug_runtime: "2.0.3"
gunicorn_runtime: "20.1.0"

