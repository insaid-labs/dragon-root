# Capsule Corp CTF — inventory
#
# Option A (recommended): copy this repo onto a FRESH Debian 12 VM and run
# the playbook locally on the box itself:
[capsule]
capsulecorp ansible_connection=local

# Option B: provision a remote fresh Debian 12 VM over SSH. Comment out the
# line above, uncomment + edit the line below, then run from your workstation:
# capsulecorp ansible_host=10.10.10.50 ansible_user=root

[capsule:vars]
ansible_python_interpreter=/usr/bin/python3
